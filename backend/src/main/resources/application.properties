spring.application.name=backend

spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/roamroute}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=${APP_UPLOAD_DIR:./storage/images}
app.upload.url-prefix=${APP_UPLOAD_URL_PREFIX:/images}

resend.api.key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
